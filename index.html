        :root {
          --bg: #0a0a0f;
          --bg2: #12121a;
          --bg3: #1a1a28;
          --accent: #7c3aed;
          --accent2: #a855f7;
          --neon: #c084fc;
          --text: #e2e8f0;
          --muted: #94a3b8;
          --border: rgba(124,58,237,0.3);
          --card: rgba(18,18,26,0.9);
          --gold: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        .hero-bg {
          background: linear-gradient(135deg, #0a0a0f 0%, #0f0a1f 50%, #0a0a0f 100%);
          position: relative;
          overflow: hidden;
        }
        .hero-bg::before {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(ellipse at 30% 40%, rgba(124,58,237,0.12) 0%, transparent 60%),

        }
        .grid-overlay {

          inset: 0;
          background-image:

            linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }

        .search-input {

          color: var(--text);

          border-radius: 0 4px 4px 0;
          color: #fbbf24;
          font-size: 13px;
          font-weight: 500;
          padding: 8px 10px;
          line-height: 1.4;
        }
        .steps-mini {
          display: flex;
          flex-direction: column;
          gap: 4px;
        }
        .steps-mini-label {
          color: var(--muted);
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          margin-bottom: 2px;
        }
        .step-item-mini {

          gap: 8px;
          font-size: 13px;
          color: var(--muted);
        }

          background: var(--accent);
          border-radius: 3px;
          color: #fff;

          font-size: 9px;

          align-items: center;
          justify-content: center;

          text-align: center;

          margin-top: auto;
        }

          font-weight: 700;
